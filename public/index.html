<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Mobile Light</title>
    <style>
        :root {
            --bg: transparent;
            --card: #1e1e2e;
            --accent: #89b4fa;
            --text: #cdd6f4;
            --on: #a6e3a1;
            --off: #f38ba8;
            --input: rgba(255, 255, 255, 0.05);
            --gap: 8px;
        }

        * { box-sizing: border-box; }

        html, body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
        }

        /* Container für das gesamte Side-Panel (Side-by-Side Grid Layout) */
        .side-panel-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100vh;
            padding: var(--gap);
            gap: var(--gap);
            width: 100%;
            transform: translateX(-100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none; /* Keine Klicks während es versteckt ist */
        }

        body.active .side-panel-container {
            transform: translateX(0) !important;
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        /* Gemeinsame Kachel-Stile */
        .glass-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        /* Linke Spalte (Plugins & Dashboard) */
        .top-panel {
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 0;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .nav-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-btn.active { background: var(--accent); color: #11111b; border-color: var(--accent); }

        /* Schließen Button */
        .close-btn {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .close-btn:hover { background: rgba(255, 0, 0, 0.2); border-color: rgba(255, 0, 0, 0.3); }

        /* Drop Zone */
        #drop-zone {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 27, 38, 0.9);
            border: 2px dashed var(--accent);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 12px;
            margin: 10px;
            backdrop-filter: blur(10px);
        }
        #drop-zone.active { display: flex; }
        #drop-zone p { font-size: 1.1rem; color: var(--accent); margin-top: 15px; }

        /* Naming Modal */
        #naming-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            border: 1px solid var(--accent);
            padding: 25px;
            border-radius: 12px;
            z-index: 300;
            width: 80%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
        }
        #naming-modal.active { display: block; }
        #naming-modal h3 { color: var(--accent); margin-top: 0; font-size: 1rem; }
        #naming-modal input { width: 100%; margin: 15px 0; }
        #naming-modal .modal-btns { display: flex; gap: 10px; }
        #naming-modal button { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; }
        #naming-modal .save { background: var(--accent); color: #11111b; }
        #naming-modal .cancel { background: rgba(255,255,255,0.05); color: white; }

        /* Verlauf Ansicht */
        .history-view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .history-search {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.1); }
        .history-item .date { font-size: 0.7rem; opacity: 0.5; margin-bottom: 4px; }
        .history-item .title { font-size: 0.85rem; font-weight: 500; }

        /* Unterer Teil: Chat & Input zusammen in einer Kachel */
        .bottom-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 0;
        }

        h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 20px 0; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 10px;
        }

        button.tool {
            border: none;
            border-radius: 8px;
            padding: 18px 10px;
            font-size: 0.85rem;
            font-weight: 700;
            background: var(--input);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        button.tool:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); }
        button.tool:active { transform: translateY(0); }

        button.tool.active-on { background: var(--on); color: #11111b; box-shadow: 0 0 20px rgba(166, 227, 161, 0.3); }
        button.tool.active-off { background: var(--off); color: #11111b; box-shadow: 0 0 20px rgba(243, 139, 168, 0.3); }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Scrollbar */
        .chat-area::-webkit-scrollbar, .settings-body::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb, .settings-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #11111b;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        input {
            flex: 1;
            background: var(--input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus { border-color: var(--accent); }

        #user-input {
            flex: 1;
            background: var(--input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            line-height: 1.4;
            max-height: 150px;
            height: 45px;
            overflow-y: hidden;
            box-sizing: border-box;
        }

        #user-input:focus { border-color: var(--accent); }

        #send-btn {
            background: var(--accent);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #mic-btn {
            background: var(--input);
            border: 1px solid rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        #mic-btn:hover { background: rgba(255,255,255,0.15); }
        #send-btn:active { transform: scale(0.95); }

        /* Attachment Preview Area */
        .attachments-bar {
            padding: 5px 20px;
            display: none;
            gap: 10px;
            background: rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .attachments-bar.active { display: flex; }
        .attachment-chip {
            background: rgba(137, 180, 250, 0.15);
            border: 1px solid rgba(137, 180, 250, 0.3);
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--accent);
            white-space: nowrap;
        }
        .attachment-chip img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }
        .attachment-chip .remove {
            cursor: pointer;
            opacity: 0.6;
        }
        .attachment-chip .remove:hover { opacity: 1; color: var(--off); }

        /* Widget Stile */
        .widget {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .calendar-widget h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .event-item:last-child { border-bottom: none; }

        .event-type {
            font-size: 0.55rem;
            padding: 2px 5px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .type-google { background: #4285f4; color: white; }
        .type-local { background: var(--accent); color: #11111b; }

        .event-title { font-size: 0.85rem; flex: 1; }
        .event-time { font-size: 0.75rem; opacity: 0.6; }

        .auth-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--accent);
            color: #11111b;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-align: center;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(137, 180, 250, 0.3); }

        /* Notification Bar Stile */
        .notification-bar {
            width: 100%;
            padding: 10px 15px;
            background: rgba(137, 180, 250, 0.1);
            border-bottom: 1px solid rgba(137, 180, 250, 0.2);
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        .notification-bar.active { display: flex; }
        .notification-text { font-size: 0.8rem; font-weight: 500; color: var(--accent); }
        .notification-action {
            padding: 4px 10px;
            background: var(--accent);
            color: #11111b;
            border-radius: 4px;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 700;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Image Widget Stile */
        .image-widget {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0; /* Verhindert das Schrumpfen */
            margin: 10px 0;
            width: calc(100% - 20px);
        }
        .generated-image {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .generated-image:hover {
            transform: scale(1.02);
        }
        .image-caption {
            font-size: 0.75rem;
            opacity: 0.6;
            font-style: italic;
        }
        .image-actions {
            display: flex;
            gap: 10px;
        }
        .image-btn {
            background: rgba(137, 180, 250, 0.2);
            border: 1px solid rgba(137, 180, 250, 0.3);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Settings Button */
        .settings-btn {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .settings-btn:hover { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: var(--accent); 
            color: var(--accent);
            transform: translateY(-50%) rotate(45deg);
        }

        /* Rechte Spalte (Chat, Verlauf, Nav) */
        .right-column {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Gemeinsamer Header der rechten Spalte */
        .right-header {
            padding: 12px 20px;
            text-align: center;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 54px;
            flex-shrink: 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .right-header .nav-bar {
            margin-bottom: 0;
            width: 60%;
        }
        /* View-spezifische Layouts für geteilte Fenster */
        body.view-plugins .right-column {
            display: none !important;
        }
        body.view-plugins .side-panel-container {
            grid-template-columns: 1fr;
            transform: translateX(-100%);
        }

        body.view-chat .top-panel {
            display: none !important;
        }
        body.view-chat .side-panel-container {
            grid-template-columns: 1fr;
            transform: translateX(100%);
        }
        /* Settings Modal has been removed to be inline settings-section instead */
        
        .settings-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .settings-group > label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        
        .hotkey-container {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .hotkey-display {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            width: 100%;
        }
        .hotkey-display:hover {
            background: rgba(137, 180, 250, 0.1);
            border-color: var(--accent);
        }
        .hotkey-display.recording {
            background: rgba(243, 139, 168, 0.1);
            border-color: var(--off);
            color: var(--off);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 0.4; }
            100% { opacity: 0.8; }
        }

        .hotkey-tip {
            font-size: 0.65rem;
            opacity: 0.5;
            font-style: italic;
            display: block;
            margin-top: 4px;
        }

        .plugins-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 5px;
        }
        
        .plugin-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            transition: all 0.2s;
        }
        .plugin-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255,255,255,0.1);
        }
        
        .plugin-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 75%;
        }
        .plugin-name-label {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--text);
        }
        .plugin-desc-label {
            font-size: 0.7rem;
            opacity: 0.6;
        }
        
        /* Premium Custom Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 38px;
            height: 20px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .3s;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: var(--text);
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--on);
        }
        input:checked + .slider:before {
            transform: translateX(18px);
            background-color: #11111b;
        }

        /* Pulsierender Lade-Zustand */
        .message.ai.thinking {
            opacity: 0.85;
            background: rgba(137, 180, 250, 0.05);
            border: 1px dashed rgba(137, 180, 250, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 200px;
        }
        
        .thinking-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: bold;
        }

        .thinking-dots {
            display: inline-flex;
            gap: 4px;
        }
        .thinking-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            animation: dotPulse 1.4s infinite ease-in-out both;
        }
        .thinking-dots span:nth-child(1) { animation-delay: -0.32s; }
        .thinking-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .live-tool-item {
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text);
            animation: slideInTool 0.25s ease-out;
        }

        @keyframes slideInTool {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .live-tool-name {
            font-family: monospace;
            background: rgba(137, 180, 250, 0.1);
            color: var(--accent);
            padding: 1px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="side-panel-container">
        <!-- Notification Bar -->
        <div id="notification-bar" class="notification-bar glass-card">
            <span class="notification-text" id="notification-text"></span>
            <a href="#" class="notification-action" id="notification-action"></a>
        </div>

        <!-- Drop Zone Overlay -->
        <div id="drop-zone">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p>.EXE hier ablegen</p>
        </div>

        <!-- Naming Modal -->
        <div id="naming-modal">
            <h3>Programm benennen</h3>
            <p id="modal-file-path" style="font-size: 0.6rem; opacity: 0.5; word-break: break-all;"></p>
            <input type="text" id="app-name-input" placeholder="Z.B. Chrome, Spotify...">
            <div class="modal-btns">
                <button class="cancel" id="modal-cancel">Abbrechen</button>
                <button class="save" id="modal-save">Speichern</button>
            </div>
        </div>



        <!-- Note Modal -->
        <div id="note-modal" class="glass-card" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--card); border: 1px solid var(--accent); padding: 25px; border-radius: 12px; z-index: 300; width: 85%; box-shadow: 0 0 35px rgba(0,0,0,0.9); backdrop-filter: blur(20px);">

                <textarea id="note-content-input" placeholder="Schreibe etwas..." style="width: 100%; height: 120px; background: var(--input); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; padding: 12px; color: white; outline: none; font-size: 0.9rem; font-family: inherit; resize: vertical; box-sizing: border-box;"></textarea>

        <!-- Task Modal -->

            <h3 style="color: var(--accent); margin-top: 0; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px;">Aufgabe erstellen</h3>
            <div class="settings-group" style="text-align: left; margin-bottom: 15px;">

                <label style="display: block; font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 6px;">Beschreibung (optional)</label>
                <input type="text" id="task-notes-input" placeholder="Zusätzliche Infos..." style="width: 100%;">

            <div class="settings-group" style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 6px;">Fälligkeitsdatum (optional)</label>
                <input type="date" id="task-due-input" style="width: 100%; color-scheme: dark;">
            </div>
            <div class="modal-btns" style="display: flex; gap: 10px;">
                <button class="cancel" onclick="closeTaskModal()" style="flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; background: rgba(255,255,255,0.05); color: white;">Abbrechen</button>
                <button class="save" onclick="saveTask()" style="flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; background: var(--accent); color: #11111b; font-weight: bold;">Erstellen</button>
            </div>

        <!-- Linke Spalte: Plugins & Dashboard -->
        <div class="top-panel glass-card">
            <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 0.85rem; text-transform: uppercase; color: var(--accent); letter-spacing: 1px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; text-align: left; font-weight: 700;">Plugins & Dashboard</h3>
            <div id="top-widgets-container"></div>
        </div>

        <!-- Rechte Spalte: Navigation, Chat und Verlauf -->
        <!-- Rechte Spalte: Navigation, Chat und Verlauf -->
        <div class="right-column glass-card">
            <!-- Gemeinsamer Header der rechten Spalte -->
            <div id="right-header" class="right-header">
                <div id="open-settings" class="settings-btn" title="Einstellungen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>

                <div id="close-panel" class="close-btn" title="Schließen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </div>
                <div class="nav-bar">

                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Neuer Chat

                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>

            <!-- Untere Kachel: Chat-System -->
            <div id="chat-section" class="bottom-section">

                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                    </button>

                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>

            <!-- Einstellungen-Kachel (Standardmäßig versteckt) -->

                <!-- Header mit Back-Pfeil oben links -->
                <div class="settings-header" style="display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); gap: 15px;">
                    <button id="settings-back-btn" style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; transition: all 0.2s; outline: none;" title="Zurück zum Chat">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </button>
                    <h3 style="margin: 0; font-size: 1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; font-weight: 700;">Einstellungen</h3>
                </div>

                <div class="settings-body" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px;">
                    <!-- Hotkey -->
                    <div class="settings-group">
                        <label>Globaler Hotkey</label>
                        <div class="hotkey-container">
                            <button id="hotkey-btn" class="hotkey-display">Ctrl+Shift+Space</button>
                            <span class="hotkey-tip">Klicken und neue Tasten drücken, dann Speichern</span>
                        </div>
                    </div>

                    <!-- Autostart toggle setting -->
                    <div class="settings-group">
                        <label>System-Einstellungen</label>
                        <div class="plugin-item" style="display: flex; align-items: center; justify-content: space-between; padding: 10px; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px;">
                            <div class="plugin-info">
                                <span class="plugin-name-label">Mit Windows starten</span>
                                <span class="plugin-desc-label">App automatisch beim Systemstart ausführen</span>
                            </div>
                            <label class="switch">
                                <input type="checkbox" id="autostart-checkbox">
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>

                    <!-- Plugins -->
                    <div class="settings-group">
                        <label>Plugins aktivieren/deaktivieren</label>
                        <div id="plugins-list" class="plugins-list" style="margin-top: 10px;">
                            <!-- Plugins werden dynamisch geladen -->
                        </div>
                    </div>
                </div>

                <div class="settings-footer" style="padding: 20px; background: rgba(0, 0, 0, 0.2); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; gap: 12px;">
                    <button class="save" id="settings-save" style="width: 100%; padding: 12px; border-radius: 8px; border: none; cursor: pointer; background: var(--accent); color: #11111b; font-weight: bold; transition: transform 0.2s;">Speichern</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const escapeHtml = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

        let ipcRenderer = null;
        let webUtils = null;
        let isElectron = false;

        try {
            if (typeof require !== 'undefined') {
                const electron = require('electron');
                ipcRenderer = electron.ipcRenderer;
                webUtils = electron.webUtils;
                isElectron = true;
            }
        } catch (e) {
            console.log("Nicht in Electron-Umgebung gestartet. Nutze Web-Modus.");
        }

        // Routing basierend auf URL-Hash
        const isPluginsView = window.location.hash === '#plugins';
        if (isPluginsView) {
            document.body.classList.add('view-plugins');
        } else {
            document.body.classList.add('view-chat');
        }

        // Wenn wir nicht in Electron laufen, machen wir die Seite direkt aktiv/sichtbar
        if (!isElectron) {
            document.body.classList.add('active');
            // Auf Handys/Webbrowsern wollen wir auch keinen transparenten Hintergrund
            document.documentElement.style.setProperty('background', '#11111b', 'important');
            document.body.style.setProperty('background', '#11111b', 'important');
        }

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const statusEl = document.getElementById('status');
        const notificationBar = document.getElementById('notification-bar');
        const notificationText = document.getElementById('notification-text');
        const notificationAction = document.getElementById('notification-action');
        const topWidgetsContainer = document.getElementById('top-widgets-container');

        let wasAlertActive = false;
        async function loadAlerts() {
            try {
                const res = await fetch('/alerts');
                const alerts = await res.json();
                
                if (alerts.length > 0) {
                    const alert = alerts[0]; // Wir zeigen erstmal nur den ersten an
                    notificationText.textContent = alert.message;
                    if (alert.actionLabel && alert.actionUrl) {
                        notificationAction.textContent = alert.actionLabel;
                        notificationAction.href = alert.actionUrl;
                        notificationAction.target = "_blank";
                        notificationAction.style.display = 'inline-block';
                    } else {
                        notificationAction.style.display = 'none';
                    }
                    notificationBar.classList.add('active');
                    wasAlertActive = true;
                } else {
                    notificationBar.classList.remove('active');
                    if (wasAlertActive) {
                        wasAlertActive = false;
                        // Notification ist weg (z.B. Login erfolgreich), also Widgets aktualisieren
                        loadTopWidgets();
                    }
                }
            } catch (e) {
                console.error("Fehler beim Laden der Alerts:", e);
            }
        }

        // Nav Elemente
        const navNew = document.getElementById('nav-new');
        const navHistory = document.getElementById('nav-history');
        const chatSection = document.getElementById('chat-section');
        const historySection = document.getElementById('history-section');
        const settingsSection = document.getElementById('settings-section');
        const settingsBackBtn = document.getElementById('settings-back-btn');
        const rightHeader = document.getElementById('right-header');
        const historyList = document.getElementById('history-list');
        const historyQuery = document.getElementById('history-query');
        const dropZone = document.getElementById('drop-zone');
        const closePanel = document.getElementById('close-panel');
        const namingModal = document.getElementById('naming-modal');
        const appNameInput = document.getElementById('app-name-input');
        const modalFilePath = document.getElementById('modal-file-path');
        const modalSave = document.getElementById('modal-save');
        const modalCancel = document.getElementById('modal-cancel');

        // Settings Elemente
        const openSettings = document.getElementById('open-settings');
        const settingsSave = document.getElementById('settings-save');
        const hotkeyBtn = document.getElementById('hotkey-btn');
        const pluginsList = document.getElementById('plugins-list');



        let currentHotkey = 'Ctrl+Shift+Space';
        let tempHotkey = '';
        let recordingHotkey = false;

        // Settings laden
        async function loadSettings() {
            try {
                const res = await fetch('/settings');
                const settings = await res.json();
                currentHotkey = settings.hotkey || 'Ctrl+Shift+Space';
                tempHotkey = currentHotkey;
                hotkeyBtn.textContent = currentHotkey;
                
                const autostartCheckbox = document.getElementById('autostart-checkbox');
                if (autostartCheckbox) {
                    autostartCheckbox.checked = settings.autostart === true;
                }
                
                const pRes = await fetch('/settings/plugins');
                const plugins = await pRes.json();
                renderPluginsSettings(plugins);
            } catch (e) {
                console.error("Fehler beim Laden der Einstellungen:", e);
            }
        }

        function renderPluginsSettings(plugins) {
            pluginsList.innerHTML = '';
            plugins.forEach(p => {
                const item = document.createElement('div');
                item.className = 'plugin-item';
                item.innerHTML = `
                    <div class="plugin-info">
                        <span class="plugin-name-label">${p.name}</span>
                        <span class="plugin-desc-label">${p.description}</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" class="plugin-checkbox" data-plugin-name="${p.name}" ${p.enabled ? 'checked' : ''}>
                        <span class="slider"></span>
                    </label>
                `;
                pluginsList.appendChild(item);
            });
        }

        openSettings.onclick = () => {
            loadSettings();
            showSection('settings');
        };

        settingsBackBtn.onclick = () => {
            recordingHotkey = false;
            hotkeyBtn.classList.remove('recording');
            showSection('chat');
        };

        settingsSave.onclick = async () => {
            recordingHotkey = false;
            hotkeyBtn.classList.remove('recording');
            
            const disabledPlugins = [];
            document.querySelectorAll('.plugin-checkbox').forEach(cb => {
                if (!cb.checked) {
                    disabledPlugins.push(cb.dataset.pluginName);
                }
            });

            const autostartCheckbox = document.getElementById('autostart-checkbox');
            const autostart = autostartCheckbox ? autostartCheckbox.checked : false;
            
            try {
                const res = await fetch('/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        hotkey: tempHotkey,
                        disabledPlugins: disabledPlugins,
                        autostart: autostart
                    })
                });
                
                if (res.ok) {
                    ipcRenderer.send('reload-hotkey');
                    showSection('chat');
                    loadTopWidgets(); // Top-Widgets sofort neu laden
                    
                    addMessage("✅ Einstellungen erfolgreich gespeichert.", false);
                } else {
                    alert("Fehler beim Speichern der Einstellungen.");
                }
            } catch (err) {
                alert("Speichern-Fehler: " + err.message);
            }
        };

        hotkeyBtn.onclick = () => {
            recordingHotkey = true;
            hotkeyBtn.classList.add('recording');
            hotkeyBtn.textContent = 'Bitte Tasten drücken...';
        };

        document.addEventListener('keydown', async (e) => {
            if (!recordingHotkey) return;
            
            e.preventDefault();
            e.stopPropagation();
            
            let parts = [];
            if (e.ctrlKey) parts.push('Ctrl');
            if (e.altKey) parts.push('Alt');
            if (e.shiftKey) parts.push('Shift');
            if (e.metaKey) parts.push('Cmd');
            
            const key = e.key;
            if (key !== 'Control' && key !== 'Alt' && key !== 'Shift' && key !== 'Meta' && key !== 'CapsLock') {
                let keyName = key;
                if (keyName === ' ') keyName = 'Space';
                else if (keyName.length === 1) keyName = keyName.toUpperCase();
                parts.push(keyName);
            }
            
            if (parts.length > 0) {
                const hotkeyStr = parts.join('+');
                tempHotkey = hotkeyStr;
                hotkeyBtn.textContent = hotkeyStr;
                
                if (key !== 'Control' && key !== 'Alt' && key !== 'Shift' && key !== 'Meta') {
                    recordingHotkey = false;
                    hotkeyBtn.classList.remove('recording');
                    
                    // Testen über IPC
                    const testResult = await ipcRenderer.invoke('register-hotkey-test', hotkeyStr);
                    if (!testResult.success) {
                        alert("Hotkey Fehler: " + testResult.error);
                        tempHotkey = currentHotkey;
                        hotkeyBtn.textContent = currentHotkey;
                    }
                }
            }
        });

        let currentConversationId = null;
        let pendingAppPath = null;

        // Modal Logik
        modalCancel.onclick = () => {
            namingModal.classList.remove('active');
            pendingAppPath = null;
        };

        modalSave.onclick = async () => {
            const name = appNameInput.value.trim();
            if (name && pendingAppPath) {
                await registerApp(name, pendingAppPath);
                namingModal.classList.remove('active');
                appNameInput.value = '';
                pendingAppPath = null;
            }
        };

        // Schließen Button
        closePanel.onclick = () => {
            ipcRenderer.send('hide-window');
        };

        // Schließen wenn auf den transparenten Hintergrund (außerhalb der Kacheln) geklickt wird
        document.addEventListener('click', (e) => {
            if (e.target === document.body || e.target.classList.contains('side-panel-container')) {
                ipcRenderer.send('hide-window');
            }
        });

        // Drag & Drop Logik
        const handleDrag = (e) => {
            e.preventDefault();
            e.stopPropagation();
        };

        document.addEventListener('dragenter', (e) => {
            handleDrag(e);
            dropZone.classList.add('active');
        });

        document.addEventListener('dragover', (e) => {
            handleDrag(e);
            dropZone.classList.add('active');
        });

        document.addEventListener('dragleave', (e) => {
            handleDrag(e);
            if (e.clientX <= 0 || e.clientY <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
                dropZone.classList.remove('active');
            }
        });

        document.addEventListener('drop', async (e) => {
            handleDrag(e);
            dropZone.classList.remove('active');
            
            try {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    let filePath = "";
                    try {
                        filePath = webUtils ? webUtils.getPathForFile(file) : file.path;
                    } catch (pathErr) {
                        filePath = file.path;
                    }

                    if (filePath && filePath.toLowerCase().endsWith('.exe')) {
                        pendingAppPath = filePath;
                        modalFilePath.textContent = filePath;
                        namingModal.classList.add('active');
                        appNameInput.focus();
                    } else {
                        alert("Bitte ziehe eine echte .EXE Datei direkt aus dem Explorer hierher.");
                    }
                }
            } catch (err) {
                alert("Fehler beim Drop: " + err.message);
            }
        });

        async function registerApp(name, path) {
            console.log("Registriere App:", name, path);
            try {
                const res = await fetch('/apps', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, path })
                });
                const data = await res.json();
                console.log("Server Antwort:", data);
                if (res.ok) {
                    addMessage(`✅ Programm "${name}" wurde registriert.`, false);
                }
            } catch (e) {
                console.error("Registrierungs-Fehler:", e);
                addMessage("Fehler beim Registrieren.", false);
            }
        }

        // Anhänge Logik
        let attachedFiles = [];
        const attachmentsBar = document.getElementById('attachments-bar');

        ipcRenderer.on('process-dropped-files', async (event, filePaths) => {
            console.log("Verarbeite gedroppte Dateien:", filePaths);
            for (const path of filePaths) {
                await addAttachment(path);
            }
        });

        async function addAttachment(filePath) {
            const fs = require('fs');
            const path = require('path');
            
            try {
                const stats = fs.statSync(filePath);
                if (stats.isDirectory()) return;

                const fileName = path.basename(filePath);
                const ext = path.extname(filePath).toLowerCase();
                const buffer = fs.readFileSync(filePath);
                const base64 = buffer.toString('base64');
                
                let mimeType = 'application/octet-stream';
                if (ext === '.png') mimeType = 'image/png';
                else if (ext === '.jpg' || ext === '.jpeg') mimeType = 'image/jpeg';
                else if (ext === '.webp') mimeType = 'image/webp';
                else if (ext === '.gif') mimeType = 'image/gif';
                else if (ext === '.pdf') mimeType = 'application/pdf';
                else if (ext === '.txt' || ext === '.md' || ext === '.ts' || ext === '.js') mimeType = 'text/plain';
                else if (ext === '.mp3') mimeType = 'audio/mpeg';
                else if (ext === '.wav') mimeType = 'audio/wav';
                else if (ext === '.mp4') mimeType = 'video/mp4';

                const attachment = {
                    name: fileName,
                    path: filePath,
                    base64: base64,
                    mimeType: mimeType,
                    isImage: mimeType.startsWith('image/')
                };

                console.log("Anhang hinzugefügt:", fileName, mimeType);
                attachedFiles.push(attachment);
                renderAttachments();
            } catch (err) {
                console.error("Fehler beim Lesen der Datei:", err);
            }
        }

        function renderAttachments() {
            attachmentsBar.innerHTML = '';
            if (attachedFiles.length > 0) {
                attachmentsBar.classList.add('active');
                attachedFiles.forEach((file, index) => {
                    const chip = document.createElement('div');
                    chip.className = 'attachment-chip';
                    
                    if (file.isImage) {
                        const img = document.createElement('img');
                        img.src = `data:${file.mimeType};base64,${file.base64}`;
                        chip.appendChild(img);
                    }

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = file.name;
                    chip.appendChild(nameSpan);

                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove';
                    removeBtn.innerHTML = '&times;';
                    removeBtn.onclick = () => {
                        attachedFiles.splice(index, 1);
                        renderAttachments();
                    };
                    chip.appendChild(removeBtn);

                    attachmentsBar.appendChild(chip);
                });
            } else {
                attachmentsBar.classList.remove('active');
            }
        }

        userInput.focus();

        const observer = new MutationObserver((mutations) => {

                    setTimeout(() => {

        // Audio Aufnahme (MediaRecorder API)
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result.split(',')[1];
                        sendAudioMessage(base64Audio);
                    };
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.style.background = 'var(--off)';
                micBtn.style.boxShadow = '0 0 20px var(--off)';
                userInput.placeholder = "Ich höre zu...";
            } catch (err) {
                userInput.placeholder = "Fehler: Mikrofon-Zugriff verweigert.";
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.style.background = 'var(--input)';
                micBtn.style.boxShadow = 'none';
            }
        }

        function renderMarkdown(text) {
            if (!text) return "";
            let html = escapeHtml(text);
            // Bold (**text**) -> Render slightly larger and bold for a premium look
            html = html.replace(/\*\*([\s\S]+?)\*\*/g, '<strong style="font-weight: 800; font-size: 1.05em; color: #ffffff;">$1</strong>');
            // Italic (*text* or _text_)
            html = html.replace(/\*([\s\S]+?)\*/g, '<em>$1</em>');
            html = html.replace(/_([\s\S]+?)_/g, '<em>$1</em>');
            // Inline Code (`code`)
            html = html.replace(/`([^`]+)`/g, '<code style="background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: var(--accent);">$1</code>');
            // Newlines to <br>
            html = html.replace(/\n/g, '<br>');
            return html;
        }

                                        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px;">
                                            <span style="font-size: 0.85rem; font-weight: bold; color: var(--text);">${escapeHtml(t.title)}</span>
                                            <button onclick="callTool('loesche_timer', {id: ${t.id}})" style="background: transparent; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 0.85rem; padding: 2px 6px;" title="Timer löschen">✖</button>
                                        </div>
                                        <div class="timer-countdown" style="font-family: monospace; font-size: 1.1rem; font-weight: bold; color: var(--accent); margin-bottom: 6px;">--:--:--</div>
                                        <div class="timer-progress-bg" style="width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-bottom: 4px;">
                                            <div class="timer-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--on)); border-radius: 2px; transition: width 0.5s linear;"></div>
                                        </div>
                                        <div style="font-size: 0.65rem; opacity: 0.4;">Bis: ${new Date(t.expiresAt).toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit', second:'2-digit'})}</div>
                                    </div>
                                `;
                            });
                        }
                        html += `</div>`;
                        widgetDiv.innerHTML = html;
                    } else if (widget.type === 'custom') {
                        if (widget.data.widgetType === 'notes_list') {
                            let html = `<h1>📝 NOTIZEN</h1>
                            <div style="text-align: left; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; max-height: 250px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">`;
                            
                            html += `<button onclick="openNoteModal()" class="nav-btn" style="width: 100%; font-size: 0.8rem; margin-bottom: 5px;">➕ Neue Notiz</button>`;
                            
                            if (!widget.data.notes || widget.data.notes.length === 0) {
                                html += `<p style="font-size: 0.75rem; opacity: 0.6; text-align: center; margin: 10px 0;">Keine Notizen.</p>`;
                            } else {
                                widget.data.notes.forEach(note => {
                                    const rawTitle = note.title;
                                    const rawContent = note.content;
                                    const cleanTitle = escapeHtml(rawTitle);
                                    const cleanContent = escapeHtml(rawContent);
                                    const escTitle = cleanTitle.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                                    const escContent = cleanContent.replace(/'/g, "\\'").replace(/"/g, "&quot;").replace(/\n/g, "\\n");
                                    html += `
                                        <div style="background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); padding: 8px 10px; border-radius: 8px; position: relative;">
                                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                                                <strong style="font-size: 0.8rem; color: var(--accent);">${cleanTitle}</strong>
                                                <div style="display: flex; gap: 8px;">
                                                    <button onclick="openNoteModal(${note.id}, '${escTitle}', '${escContent}')" style="background: transparent; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 0.75rem; padding: 0 4px;" title="Bearbeiten">✏️</button>
                                                    <button onclick="deleteNote(${note.id})" style="background: transparent; border: none; color: var(--off); cursor: pointer; font-size: 0.75rem; padding: 0 4px;" title="Löschen">✖</button>
                                                </div>
                                            </div>
                                            <div style="font-size: 0.75rem; opacity: 0.8; white-space: pre-wrap; word-break: break-word; line-height: 1.3;">${cleanContent}</div>
                                        </div>
                                    `;
                                });
                            }
                            html += `</div>`;
                            widgetDiv.innerHTML = html;
                        } else if (widget.data.widgetType === 'tasks_overview') {
                            let html = `<h1>✅ AUFGABEN</h1>
                            <div style="text-align: left; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px;">`;
                            
                            html += `<button onclick="openTaskModal()" class="nav-btn" style="width: 100%; font-size: 0.8rem; margin-bottom: 5px;">➕ Neue Aufgabe</button>`;
                            
                            if (!widget.data.tasks || widget.data.tasks.length === 0) {
                                html += `<p style="font-size: 0.75rem; opacity: 0.6; text-align: center; margin: 10px 0;">Keine offenen Aufgaben.</p>`;
                            } else {
                                const groupedTasks = {};
                                widget.data.tasks.forEach(t => {
                                    const listName = t.listTitle || "Meine Aufgaben";
                                    if (!groupedTasks[listName]) groupedTasks[listName] = [];
                                    groupedTasks[listName].push(t);
                                });

                                Object.keys(groupedTasks).forEach(listName => {
                                    html += `<div style="font-weight: 600; font-size: 0.7rem; color: rgba(255,255,255,0.5); margin: 8px 0 4px 0; text-transform: uppercase; letter-spacing: 0.5px;">${listName}</div>`;
                                    html += `<div style="display: flex; flex-direction: column; gap: 4px;">`;
                                    groupedTasks[listName].forEach(t => {
                                        html += `
                                            <label style="font-size: 0.8rem; display: flex; align-items: flex-start; gap: 8px; padding: 6px 8px; border-radius: 6px; background: rgba(255,255,255,0.05); transition: background 0.2s; cursor: pointer;">
                                                <input type="checkbox" data-task-id="${t.id}" data-tasklist-id="${t.tasklistId}" onchange="completeTask(this)" style="margin-top: 3px; accent-color: var(--accent); cursor: pointer;">
                                                <span style="flex: 1; line-height: 1.4;">${escapeHtml(t.title)}</span>
                                            </label>`;
                                    });
                                    html += `</div>`;
                                });
                            }
                            html += `</div>`;
                            widgetDiv.innerHTML = html;
                        }
                    }
                    
                    topWidgetsContainer.appendChild(widgetDiv);
                });
                
                // Sofort prüfen, ob ein Widget (wie Calendar) Fehler geworfen hat und Authentifizierung fordert
                loadAlerts();
            } catch (e) {
                console.error("Fehler beim Laden der Top-Widgets:", e);
            }
        }

        async function callTool(name, args) {
            try {
                await fetch('/api/tools/call', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, arguments: args })
                });
                loadTopWidgets();
                ipcRenderer.send('widgets-updated');
            } catch(e) {
                console.error("Tool Call Error:", e);
            }
        }

        window.callTool = callTool;

        // Notes and Tasks JS Modals Logic
        const noteModal = document.getElementById('note-modal');
        const noteIdInput = document.getElementById('note-id-input');
        const noteTitleInput = document.getElementById('note-title-input');
        const noteContentInput = document.getElementById('note-content-input');
        const noteModalTitle = document.getElementById('note-modal-title');

        window.openNoteModal = function(id = null, title = '', content = '') {
            noteIdInput.value = id || '';
            noteTitleInput.value = title;
            noteContentInput.value = content;
            noteModalTitle.textContent = id ? 'Notiz bearbeiten' : 'Notiz erstellen';
            noteModal.style.display = 'block';
        };

        window.closeNoteModal = function() {
            noteModal.style.display = 'none';
        };

        window.saveNote = async function() {
            const id = noteIdInput.value;
            const title = noteTitleInput.value.trim();
            const content = noteContentInput.value.trim();
            if (!title || !content) {
                alert("Titel und Inhalt sind erforderlich.");
                return;
            }
            if (id) {
                await callTool('bearbeite_notiz', { id: parseInt(id), titel: title, inhalt: content });
            } else {
                await callTool('erstelle_notiz', { titel: title, inhalt: content });
            }
            closeNoteModal();
        };

        window.deleteNote = async function(id) {
            if (confirm("Möchtest du diese Notiz wirklich löschen?")) {
                await callTool('loesche_notiz', { id: parseInt(id) });
            }
        };

        window.deleteCalendarEvent = async function(eventId, datum, isRecurring) {
            if (isRecurring) {
                const cancelOccurrence = confirm(
                    "Möchtest du NUR DIESES EINE VORKOMMEN löschen?\n\n" +
                    "(Klicke 'OK' für nur dieses Vorkommen, oder 'Abbrechen' für die GESAMTE SERIE)"
                );
                
                if (cancelOccurrence) {
                    await callTool('loesche_termin', { eventId, datum, nurDiesesVorkommen: true });
                } else {
                    const deleteSeries = confirm("Möchtest du wirklich die GESAMTE SERIE löschen?");
                    if (deleteSeries) {
                        await callTool('loesche_termin', { eventId, datum, nurDiesesVorkommen: false });
                    }
                }
            } else {
                if (confirm("Möchtest du diesen Termin wirklich löschen?")) {
                    await callTool('loesche_termin', { eventId, datum, nurDiesesVorkommen: false });
                }
            }
        };

        const taskModal = document.getElementById('task-modal');
        const taskTitleInput = document.getElementById('task-title-input');
        const taskNotesInput = document.getElementById('task-notes-input');
        const taskDueInput = document.getElementById('task-due-input');

        window.openTaskModal = function() {
            taskTitleInput.value = '';
            taskNotesInput.value = '';
            taskDueInput.value = '';
            taskModal.style.display = 'block';
        };

        window.closeTaskModal = function() {
            taskModal.style.display = 'none';
        };

        window.saveTask = async function() {
            const title = taskTitleInput.value.trim();
            const notes = taskNotesInput.value.trim();
            const due = taskDueInput.value;
            if (!title) {
                alert("Titel ist erforderlich.");
                return;
            }
            const args = { titel: title };
            if (notes) args.notizen = notes;
            if (due) args.datum = due;

            await callTool('erstelle_aufgabe', args);
            closeTaskModal();
        };

        async function completeTask(checkbox) {
            const taskId = checkbox.getAttribute('data-task-id');
            const tasklistId = checkbox.getAttribute('data-tasklist-id');
            if (!taskId || !tasklistId) return;

            checkbox.disabled = true;
            const textSpan = checkbox.nextElementSibling;
            if (textSpan) {
                textSpan.style.textDecoration = 'line-through';
                textSpan.style.opacity = '0.5';
            }

            try {
                const res = await fetch('/tasks/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tasklistId, taskId })
                });
                
                if (res.ok) {
                    console.log("Aufgabe erfolgreich erledigt!");
                    // Kurze Verzögerung für die visuelle Rückmeldung
                    setTimeout(() => {
                        loadTopWidgets();
                        if (isElectron && ipcRenderer) {
                            ipcRenderer.send('widgets-updated');
                        }
                    }, 600);
                } else {
                    throw new Error("Fehler beim Erledigen");
                }
            } catch (e) {
                console.error(e);
                checkbox.disabled = false;
                if (textSpan) {
                    textSpan.style.textDecoration = 'none';
                    textSpan.style.opacity = '1';
                }
                checkbox.checked = false;
                alert("Aufgabe konnte nicht erledigt werden.");
            }
        }

        window.completeTask = completeTask;

        function autoResizeInput() {
            userInput.style.height = 'auto';
            if (!userInput.value) {
                userInput.style.height = '45px';
                userInput.style.overflowY = 'hidden';
                return;
            }
            const scrollHeight = userInput.scrollHeight;
            if (scrollHeight > 150) {
                userInput.style.height = '150px';
                userInput.style.overflowY = 'auto';
            } else {
                userInput.style.height = Math.max(45, scrollHeight) + 'px';
                userInput.style.overflowY = 'hidden';
            }
        }

        sendBtn.onclick = sendMessage;
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (e.shiftKey) {
                    // Shift + Enter: let browser insert newline, and resize input
                    setTimeout(autoResizeInput, 0);
                } else {
                    // Enter alone: send message and prevent newline
                    e.preventDefault();
                    sendMessage();
                }
            }
        });
        userInput.addEventListener('input', autoResizeInput);

        if (isElectron && ipcRenderer) {
            ipcRenderer.on('settings-updated', () => {
                console.log('Empfange settings-updated Event. Lade Widgets neu...');
                loadTopWidgets();
            });

            ipcRenderer.on('reload-widgets', () => {
                console.log('Empfange reload-widgets Event. Lade Widgets neu...');
                loadTopWidgets();
            });
        }

        loadTopWidgets();
        setInterval(loadAlerts, 3000); // Alle 3 Sekunden prüfen

        function playAlarmBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                function beep(freq, duration, delay) {
                    setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                        osc.start();
                        osc.stop(audioCtx.currentTime + duration);
                    }, delay);
                }
                beep(880, 0.15, 0);
                beep(880, 0.15, 200);
            } catch (e) {
                console.error("Audio beep error:", e);
            }
        }

        function updateAllCountdowns() {
            document.querySelectorAll('.timer-card').forEach(card => {
                const createdTime = new Date(card.dataset.created).getTime();
                const expiresTime = new Date(card.dataset.expires).getTime();
                const now = Date.now();
                const total = expiresTime - createdTime;
                const remaining = expiresTime - now;

                const countdownEl = card.querySelector('.timer-countdown');
                const progressBar = card.querySelector('.timer-progress-bar');

                if (remaining <= 0) {
                    countdownEl.textContent = "ABGELAUFEN!";
                    countdownEl.style.color = "var(--off)";
                    progressBar.style.width = "100%";
                    progressBar.style.background = "var(--off)";
                    card.style.borderColor = "rgba(243, 139, 168, 0.4)";
                    card.style.background = "rgba(243, 139, 168, 0.05)";
                    card.style.animation = "pulse 1.5s infinite";
                    
                    if (!card.querySelector('.dismiss-btn')) {
                        const dismissBtn = document.createElement('button');
                        dismissBtn.className = 'dismiss-btn';
                        dismissBtn.textContent = 'Bestätigen';
                        dismissBtn.style.cssText = "margin-top: 8px; width: 100%; padding: 6px 8px; background: var(--off); color: #11111b; border: none; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: all 0.2s;";
                        dismissBtn.onmouseover = () => { dismissBtn.style.filter = 'brightness(1.1)'; };
                        dismissBtn.onmouseout = () => { dismissBtn.style.filter = 'none'; };
                        dismissBtn.onclick = () => callTool('quittiere_timer', { id: parseInt(card.id.split('-').pop()) });
                        card.appendChild(dismissBtn);
                        
                        playAlarmBeep();
                        const alarmInterval = setInterval(() => {
                            if (document.getElementById(card.id) && card.querySelector('.dismiss-btn')) {
                                playAlarmBeep();
                            } else {
                                clearInterval(alarmInterval);
                            }
                        }, 3000);
                    }
                } else {
                    const secs = Math.floor((remaining / 1000) % 60);
                    const mins = Math.floor((remaining / 1000 / 60) % 60);
                    const hours = Math.floor((remaining / 1000 / 60 / 60) % 24);
                    const days = Math.floor(remaining / 1000 / 60 / 60 / 24);

                    let timeStr = "";
                    if (days > 0) timeStr += `${days}d `;
                    timeStr += `${hours.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                    countdownEl.textContent = timeStr;

                    const elapsed = now - createdTime;
                    const percent = Math.min(100, Math.max(0, (elapsed / total) * 100));
                    progressBar.style.width = `${percent}%`;
                }
            });
        }

        setInterval(updateAllCountdowns, 500);

        function formatEventTime(ev) {
            const start = new Date(ev.time);
            const end = ev.endTime ? new Date(ev.endTime) : start;
            
            const formatTime = (d) => d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
            const formatDate = (d) => d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });
            
            const isSameDay = start.toDateString() === end.toDateString();
            
            let timeStr = "";
            if (ev.isAllDay) {
                if (isSameDay) {
                    timeStr = `${formatDate(start)} (Ganztägig)`;
                } else {
                    const days = Math.round((end.getTime() - start.getTime()) / (24 * 3600 * 1000));
                    const daysStr = days > 1 ? `${days} Tage` : '2 Tage';
                    timeStr = `${formatDate(start)} - ${formatDate(end)} (${daysStr}, Ganztägig)`;
                }
            } else {
                if (isSameDay) {
                    timeStr = `${formatDate(start)}, ${formatTime(start)} - ${formatTime(end)}`;
                } else {
                    const days = Math.round((end.getTime() - start.getTime()) / (24 * 3600 * 1000));
                    const daysStr = days > 1 ? `${days} Tage` : '2 Tage';
                    timeStr = `${formatDate(start)} ${formatTime(start)} - ${formatDate(end)} ${formatTime(end)} (${daysStr})`;
                }
            }
            
            if (ev.originalStart) {
                const origStart = new Date(ev.originalStart);
                const origEnd = ev.originalEnd ? new Date(ev.originalEnd) : new Date(origStart.getTime() + (end.getTime() - start.getTime()));
                const origIsSameDay = origStart.toDateString() === origEnd.toDateString();
                
                let origTimeStr = "";
                if (ev.isAllDay) {
                    if (origIsSameDay) {
                        origTimeStr = `${formatDate(origStart)}`;
                    } else {
                        origTimeStr = `${formatDate(origStart)} - ${formatDate(origEnd)}`;
                    }
                } else {
                    if (origIsSameDay) {
                        origTimeStr = `${formatDate(origStart)}, ${formatTime(origStart)} - ${formatTime(origEnd)}`;
                    } else {
                        origTimeStr = `${formatDate(origStart)} ${formatTime(origStart)} - ${formatDate(origEnd)} ${formatTime(origEnd)}`;
                    }
                }
                
                return `
                    <div class="rescheduled-container" style="display: flex; flex-direction: column; gap: 2px;">
                        <span style="text-decoration: line-through; opacity: 0.5; font-size: 0.7rem;">War: ${origTimeStr}</span>
                        <span style="color: #f9e2af; font-weight: 500; font-size: 0.75rem; display: flex; align-items: center; gap: 4px;">
                            ➔ Neu: ${timeStr}
                        </span>
                    </div>
                `;
            }
            
            return `<span style="font-size: 0.75rem; opacity: 0.75;">${timeStr}</span>`;
        }

    </script>
</body>
</html>
