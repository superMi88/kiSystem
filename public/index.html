<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Mobile Light</title>
    <style>
        :root {
            --bg: transparent;
            --card: #1e1e2e;
            --accent: #89b4fa;
            --text: #cdd6f4;
            --on: #a6e3a1;
            --off: #f38ba8;
            --input: rgba(255, 255, 255, 0.05);
            --gap: 8px;
        }

        * { box-sizing: border-box; }

        html, body {
            background: transparent !important;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
        }

        /* Container für das gesamte Side-Panel */
        .side-panel-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: var(--gap);
            width: 100%;
            transform: translateX(100%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none; /* Keine Klicks während es versteckt ist */
        }

        body.active .side-panel-container {
            transform: translateX(0);
            opacity: 1;
            pointer-events: auto;
        }

        /* Gemeinsame Kachel-Stile */
        .glass-card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
        }

        /* Top Panel: Nav & Lichtsteuerung */
        .top-panel {
            padding: 15px 25px 25px 25px;
            margin-bottom: var(--gap);
            text-align: center;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .nav-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
            padding: 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .nav-btn:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-btn.active { background: var(--accent); color: #11111b; border-color: var(--accent); }

        /* Schließen Button */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .close-btn:hover { background: rgba(255, 0, 0, 0.2); border-color: rgba(255, 0, 0, 0.3); }

        /* Drop Zone */
        #drop-zone {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(26, 27, 38, 0.9);
            border: 2px dashed var(--accent);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            border-radius: 12px;
            margin: 10px;
            backdrop-filter: blur(10px);
        }
        #drop-zone.active { display: flex; }
        #drop-zone p { font-size: 1.1rem; color: var(--accent); margin-top: 15px; }

        /* Naming Modal */
        #naming-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card);
            border: 1px solid var(--accent);
            padding: 25px;
            border-radius: 12px;
            z-index: 300;
            width: 80%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
        }
        #naming-modal.active { display: block; }
        #naming-modal h3 { color: var(--accent); margin-top: 0; font-size: 1rem; }
        #naming-modal input { width: 100%; margin: 15px 0; }
        #naming-modal .modal-btns { display: flex; gap: 10px; }
        #naming-modal button { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; }
        #naming-modal .save { background: var(--accent); color: #11111b; }
        #naming-modal .cancel { background: rgba(255,255,255,0.05); color: white; }

        /* Verlauf Ansicht */
        .history-view {
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
        }

        .history-search {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .history-item {
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .history-item:hover { background: rgba(255, 255, 255, 0.08); border-color: rgba(255, 255, 255, 0.1); }
        .history-item .date { font-size: 0.7rem; opacity: 0.5; margin-bottom: 4px; }
        .history-item .title { font-size: 0.85rem; font-weight: 500; }

        /* Unterer Teil: Chat & Input zusammen in einer Kachel */
        .bottom-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: var(--gap);
        }

        h1 { font-size: 1.1rem; font-weight: 600; margin: 0 0 20px 0; color: var(--accent); letter-spacing: 1.5px; text-transform: uppercase; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 10px;
        }

        button.tool {
            border: none;
            border-radius: 8px;
            padding: 18px 10px;
            font-size: 0.85rem;
            font-weight: 700;
            background: var(--input);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        
        button.tool:hover { transform: translateY(-2px); background: rgba(255,255,255,0.1); }
        button.tool:active { transform: translateY(0); }

        button.tool.active-on { background: var(--on); color: #11111b; box-shadow: 0 0 20px rgba(166, 227, 161, 0.3); }
        button.tool.active-off { background: var(--off); color: #11111b; box-shadow: 0 0 20px rgba(243, 139, 168, 0.3); }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Custom Scrollbar */
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #11111b;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 12px;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
        }

        input {
            flex: 1;
            background: var(--input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px 18px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        input:focus { border-color: var(--accent); }

        #send-btn {
            background: var(--accent);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #mic-btn {
            background: var(--input);
            border: 1px solid rgba(255,255,255,0.1);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        #mic-btn:hover { background: rgba(255,255,255,0.15); }
        #send-btn:active { transform: scale(0.95); }

        /* Attachment Preview Area */
        .attachments-bar {
            padding: 5px 20px;
            display: none;
            gap: 10px;
            background: rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .attachments-bar.active { display: flex; }
        .attachment-chip {
            background: rgba(137, 180, 250, 0.15);
            border: 1px solid rgba(137, 180, 250, 0.3);
            border-radius: 6px;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            color: var(--accent);
            white-space: nowrap;
        }
        .attachment-chip img {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            object-fit: cover;
        }
        .attachment-chip .remove {
            cursor: pointer;
            opacity: 0.6;
        }
        .attachment-chip .remove:hover { opacity: 1; color: var(--off); }

        /* Widget Stile */
        .widget {
            width: 100%;
            margin-top: 10px;
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .calendar-widget h4 {
            margin: 0 0 10px 0;
            color: var(--accent);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .event-item:last-child { border-bottom: none; }

        .event-type {
            font-size: 0.55rem;
            padding: 2px 5px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .type-google { background: #4285f4; color: white; }
        .type-local { background: var(--accent); color: #11111b; }

        .event-title { font-size: 0.85rem; flex: 1; }
        .event-time { font-size: 0.75rem; opacity: 0.6; }

        .auth-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: var(--accent);
            color: #11111b;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-align: center;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(137, 180, 250, 0.3); }

        /* Notification Bar Stile */
        .notification-bar {
            width: 100%;
            padding: 10px 15px;
            background: rgba(137, 180, 250, 0.1);
            border-bottom: 1px solid rgba(137, 180, 250, 0.2);
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        .notification-bar.active { display: flex; }
        .notification-text { font-size: 0.8rem; font-weight: 500; color: var(--accent); }
        .notification-action {
            padding: 4px 10px;
            background: var(--accent);
            color: #11111b;
            border-radius: 4px;
            font-size: 0.75rem;
            text-decoration: none;
            font-weight: 700;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Image Widget Stile */
        .image-widget {
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0; /* Verhindert das Schrumpfen */
            margin: 10px 0;
            width: calc(100% - 20px);
        }
        .generated-image {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s;
        }
        .generated-image:hover {
            transform: scale(1.02);
        }
        .image-caption {
            font-size: 0.75rem;
            opacity: 0.6;
            font-style: italic;
        }
        .image-actions {
            display: flex;
            gap: 10px;
        }
        .image-btn {
            background: rgba(137, 180, 250, 0.2);
            border: 1px solid rgba(137, 180, 250, 0.3);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="side-panel-container">
        <!-- Notification Bar -->
        <div id="notification-bar" class="notification-bar glass-card">
            <span class="notification-text" id="notification-text"></span>
            <a href="#" class="notification-action" id="notification-action"></a>
        </div>

        <!-- Drop Zone Overlay -->
        <div id="drop-zone">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <p>.EXE hier ablegen</p>
        </div>

        <!-- Naming Modal -->
        <div id="naming-modal">
            <h3>Programm benennen</h3>
            <p id="modal-file-path" style="font-size: 0.6rem; opacity: 0.5; word-break: break-all;"></p>
            <input type="text" id="app-name-input" placeholder="Z.B. Chrome, Spotify...">
            <div class="modal-btns">
                <button class="cancel" id="modal-cancel">Abbrechen</button>
                <button class="save" id="modal-save">Speichern</button>
            </div>
        </div>

        <!-- Obere Kachel: Navigation & Lichtsteuerung -->
        <div class="top-panel glass-card">
            <div id="close-panel" class="close-btn" title="Schließen">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </div>
            <div class="nav-bar">
                <button id="nav-new" class="nav-btn active">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Neuer Chat
                </button>
                <button id="nav-history" class="nav-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
                    Verlauf
                </button>
            </div>

            <h1>LICHT STEUERUNG</h1>
            <div class="controls">
                <button id="btn-on" class="tool">EIN</button>
                <button id="btn-off" class="tool">AUS</button>
            </div>
            <div id="status" style="font-size: 0.75rem; opacity: 0.6;">Verbinde...</div>
        </div>

        <!-- Untere Kachel: Chat-System -->
        <div id="chat-section" class="bottom-section glass-card">
            <div class="chat-area" id="chat-box">
                <div class="message ai">Hallo! Ich bin dein Gemini-Lichtassistent. Wie kann ich dir helfen?</div>
            </div>

            <div id="attachments-bar" class="attachments-bar">
                <!-- Dateianhänge kommen hierher -->
            </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Nachricht an Gemini..." autofocus>
                <button id="mic-btn" title="Spracheingabe">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>
                <button id="send-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>

        <!-- Verlauf-Kachel (Standardmäßig versteckt) -->
        <div id="history-section" class="history-view glass-card">
            <div class="history-search">
                <input type="text" id="history-query" placeholder="Suchen...">
            </div>
            <div class="history-list" id="history-list">
                <!-- Verlaufseinträge kommen hierher -->
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const statusEl = document.getElementById('status');
        const notificationBar = document.getElementById('notification-bar');
        const notificationText = document.getElementById('notification-text');
        const notificationAction = document.getElementById('notification-action');
        const btnOn = document.getElementById('btn-on');
        const btnOff = document.getElementById('btn-off');

        async function loadAlerts() {
            try {
                const res = await fetch('/alerts');
                const alerts = await res.json();
                
                if (alerts.length > 0) {
                    const alert = alerts[0]; // Wir zeigen erstmal nur den ersten an
                    notificationText.textContent = alert.message;
                    if (alert.actionLabel && alert.actionUrl) {
                        notificationAction.textContent = alert.actionLabel;
                        notificationAction.href = alert.actionUrl;
                        notificationAction.target = "_blank";
                        notificationAction.style.display = 'inline-block';
                    } else {
                        notificationAction.style.display = 'none';
                    }
                    notificationBar.classList.add('active');
                } else {
                    notificationBar.classList.remove('active');
                }
            } catch (e) {
                console.error("Fehler beim Laden der Alerts:", e);
            }
        }

        // Nav Elemente
        const navNew = document.getElementById('nav-new');
        const navHistory = document.getElementById('nav-history');
        const chatSection = document.getElementById('chat-section');
        const historySection = document.getElementById('history-section');
        const historyList = document.getElementById('history-list');
        const historyQuery = document.getElementById('history-query');
        const dropZone = document.getElementById('drop-zone');
        const closePanel = document.getElementById('close-panel');
        const namingModal = document.getElementById('naming-modal');
        const appNameInput = document.getElementById('app-name-input');
        const modalFilePath = document.getElementById('modal-file-path');
        const modalSave = document.getElementById('modal-save');
        const modalCancel = document.getElementById('modal-cancel');

        const { ipcRenderer, webUtils } = require('electron');

        let currentConversationId = null;
        let pendingAppPath = null;

        // Modal Logik
        modalCancel.onclick = () => {
            namingModal.classList.remove('active');
            pendingAppPath = null;
        };

        modalSave.onclick = async () => {
            const name = appNameInput.value.trim();
            if (name && pendingAppPath) {
                await registerApp(name, pendingAppPath);
                namingModal.classList.remove('active');
                appNameInput.value = '';
                pendingAppPath = null;
            }
        };

        // Schließen Button
        closePanel.onclick = () => {
            ipcRenderer.send('hide-window');
        };

        // Drag & Drop Logik
        const handleDrag = (e) => {
            e.preventDefault();
            e.stopPropagation();
        };

        document.addEventListener('dragenter', (e) => {
            handleDrag(e);
            dropZone.classList.add('active');
        });

        document.addEventListener('dragover', (e) => {
            handleDrag(e);
            dropZone.classList.add('active');
        });

        document.addEventListener('dragleave', (e) => {
            handleDrag(e);
            if (e.clientX <= 0 || e.clientY <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
                dropZone.classList.remove('active');
            }
        });

        document.addEventListener('drop', async (e) => {
            handleDrag(e);
            dropZone.classList.remove('active');
            
            try {
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    const file = files[0];
                    let filePath = "";
                    try {
                        filePath = webUtils ? webUtils.getPathForFile(file) : file.path;
                    } catch (pathErr) {
                        filePath = file.path;
                    }

                    if (filePath && filePath.toLowerCase().endsWith('.exe')) {
                        pendingAppPath = filePath;
                        modalFilePath.textContent = filePath;
                        namingModal.classList.add('active');
                        appNameInput.focus();
                    } else {
                        alert("Bitte ziehe eine echte .EXE Datei direkt aus dem Explorer hierher.");
                    }
                }
            } catch (err) {
                alert("Fehler beim Drop: " + err.message);
            }
        });

        async function registerApp(name, path) {
            console.log("Registriere App:", name, path);
            try {
                const res = await fetch('/apps', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name, path })
                });
                const data = await res.json();
                console.log("Server Antwort:", data);
                if (res.ok) {
                    addMessage(`✅ Programm "${name}" wurde registriert.`, false);
                }
            } catch (e) {
                console.error("Registrierungs-Fehler:", e);
                addMessage("Fehler beim Registrieren.", false);
            }
        }

        // Anhänge Logik
        let attachedFiles = [];
        const attachmentsBar = document.getElementById('attachments-bar');

        ipcRenderer.on('process-dropped-files', async (event, filePaths) => {
            console.log("Verarbeite gedroppte Dateien:", filePaths);
            for (const path of filePaths) {
                await addAttachment(path);
            }
        });

        async function addAttachment(filePath) {
            const fs = require('fs');
            const path = require('path');
            
            try {
                const stats = fs.statSync(filePath);
                if (stats.isDirectory()) return;

                const fileName = path.basename(filePath);
                const ext = path.extname(filePath).toLowerCase();
                const buffer = fs.readFileSync(filePath);
                const base64 = buffer.toString('base64');
                
                let mimeType = 'application/octet-stream';
                if (ext === '.png') mimeType = 'image/png';
                else if (ext === '.jpg' || ext === '.jpeg') mimeType = 'image/jpeg';
                else if (ext === '.webp') mimeType = 'image/webp';
                else if (ext === '.gif') mimeType = 'image/gif';
                else if (ext === '.pdf') mimeType = 'application/pdf';
                else if (ext === '.txt' || ext === '.md' || ext === '.ts' || ext === '.js') mimeType = 'text/plain';
                else if (ext === '.mp3') mimeType = 'audio/mpeg';
                else if (ext === '.wav') mimeType = 'audio/wav';
                else if (ext === '.mp4') mimeType = 'video/mp4';

                const attachment = {
                    name: fileName,
                    path: filePath,
                    base64: base64,
                    mimeType: mimeType,
                    isImage: mimeType.startsWith('image/')
                };

                console.log("Anhang hinzugefügt:", fileName, mimeType);
                attachedFiles.push(attachment);
                renderAttachments();
            } catch (err) {
                console.error("Fehler beim Lesen der Datei:", err);
            }
        }

        function renderAttachments() {
            attachmentsBar.innerHTML = '';
            if (attachedFiles.length > 0) {
                attachmentsBar.classList.add('active');
                attachedFiles.forEach((file, index) => {
                    const chip = document.createElement('div');
                    chip.className = 'attachment-chip';
                    
                    if (file.isImage) {
                        const img = document.createElement('img');
                        img.src = `data:${file.mimeType};base64,${file.base64}`;
                        chip.appendChild(img);
                    }

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = file.name;
                    chip.appendChild(nameSpan);

                    const removeBtn = document.createElement('span');
                    removeBtn.className = 'remove';
                    removeBtn.innerHTML = '&times;';
                    removeBtn.onclick = () => {
                        attachedFiles.splice(index, 1);
                        renderAttachments();
                    };
                    chip.appendChild(removeBtn);

                    attachmentsBar.appendChild(chip);
                });
            } else {
                attachmentsBar.classList.remove('active');
            }
        }

        // Fokus beim Start
        userInput.focus();

        // Fokus-Trigger bei Electron-Aktivierung
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'class' && document.body.classList.contains('active')) {
                    setTimeout(() => {
                        if (chatSection.style.display !== 'none') userInput.focus();
                    }, 100);
                }
            });
        });
        observer.observe(document.body, { attributes: true });

        // Navigation
        navNew.onclick = () => {
            currentConversationId = null;
            chatBox.innerHTML = '<div class="message ai">Ein neuer Chat wurde gestartet. Wie kann ich dir helfen?</div>';
            showSection('chat');
        };

        navHistory.onclick = () => {
            showSection('history');
            loadHistory();
        };

        function showSection(name) {
            if (name === 'chat') {
                chatSection.style.display = 'flex';
                historySection.style.display = 'none';
                navNew.classList.add('active');
                navHistory.classList.remove('active');
            } else {
                chatSection.style.display = 'none';
                historySection.style.display = 'flex';
                navNew.classList.remove('active');
                navHistory.classList.add('active');
            }
        }

        // Verlauf laden
        async function loadHistory() {
            const res = await fetch('/conversations');
            const conversations = await res.json();
            renderHistory(conversations);
        }

        function renderHistory(conversations) {
            historyList.innerHTML = '';
            conversations.forEach(conv => {
                const item = document.createElement('div');
                item.className = 'history-item';
                const date = new Date(conv.createdAt).toLocaleString('de-DE', { 
                    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' 
                });
                item.innerHTML = `
                    <div class="date">${date}</div>
                    <div class="title">${conv.title}</div>
                `;
                item.onclick = () => loadConversation(conv.id);
                historyList.appendChild(item);
            });
        }

        async function loadConversation(id) {
            const res = await fetch(`/conversations/${id}`);
            const messages = await res.json();
            
            currentConversationId = id;
            chatBox.innerHTML = '';
            messages.forEach(msg => addMessage(msg.text, msg.role === 'user'));
            
            showSection('chat');
        }

        // Suche
        historyQuery.oninput = async () => {
            const query = historyQuery.value.toLowerCase();
            const res = await fetch('/conversations');
            const conversations = await res.json();
            const filtered = conversations.filter(c => c.title.toLowerCase().includes(query));
            renderHistory(filtered);
        };

        // Audio Aufnahme (MediaRecorder API)
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result.split(',')[1];
                        sendAudioMessage(base64Audio);
                    };
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                isRecording = true;
                micBtn.style.background = 'var(--off)';
                micBtn.style.boxShadow = '0 0 20px var(--off)';
                userInput.placeholder = "Ich höre zu...";
            } catch (err) {
                userInput.placeholder = "Fehler: Mikrofon-Zugriff verweigert.";
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.style.background = 'var(--input)';
                micBtn.style.boxShadow = 'none';
            }
        }

        async function sendAudioMessage(base64Audio) {
            addMessage("🎤 Sprachnachricht gesendet...", true);
            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        audio: base64Audio,
                        conversationId: currentConversationId 
                    })
                });
                const data = await res.json();
                currentConversationId = data.conversationId;
                addMessage(data.text, false, data.widget);
                updateStatus();
                userInput.placeholder = "Nachricht an Gemini...";
            } catch (e) {
                addMessage("Fehler bei der Audio-Verarbeitung.", false);
            }
        }

        micBtn.onclick = () => isRecording ? stopRecording() : startRecording();

        function addMessage(text, isUser, widget = null) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'ai'}`;
            msg.textContent = text;
            chatBox.appendChild(msg);

            if (widget) {
                renderWidget(widget, chatBox);
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function renderWidget(data, container) {
            const widgetDiv = document.createElement('div');
            widgetDiv.className = 'widget';

            if (data.type === 'calendar_widget') {
                widgetDiv.classList.add('calendar-widget');
                const dateStr = new Date(data.date).toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: 'long' });
                let html = `<h4>📅 Termine für ${dateStr}</h4>`;
                
                if (data.events.length === 0) {
                    html += `<p style="font-size:0.8rem; opacity:0.6;">Keine Termine für diesen Tag.</p>`;
                } else {
                    data.events.forEach(ev => {
                        const time = ev.time ? new Date(ev.time).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) : 'Ganztägig';
                        html += `
                            <div class="event-item">
                                <span class="event-type type-${ev.type}">${ev.type}</span>
                                <span class="event-title">${ev.title}</span>
                                <span class="event-time">${time}</span>
                            </div>
                        `;
                    });
                }
                widgetDiv.innerHTML = html;
            } else if (data.status === 'auth_required') {
                widgetDiv.innerHTML = `
                    <p style="font-size:0.85rem; margin:0;">${data.message}</p>
                    <a href="${data.url}" target="_blank" class="auth-btn">Google Kalender verbinden</a>
                `;
            } else if (data.type === 'image_widget') {
                widgetDiv.classList.add('image-widget');
                widgetDiv.innerHTML = `
                    <img src="${data.url}" class="generated-image" alt="${data.prompt}">
                    <div class="image-caption">"${data.prompt}"</div>
                `;
            }

            container.appendChild(widgetDiv);
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && attachedFiles.length === 0) return;

            addMessage(text || (attachedFiles.length + " Anhänge"), true);
            userInput.value = '';

            const attachmentsToSend = [...attachedFiles];
            console.log("Sende Nachricht mit Anhängen:", attachmentsToSend.length);
            attachedFiles = [];
            renderAttachments();

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        message: text,
                        attachments: attachmentsToSend,
                        conversationId: currentConversationId 
                    })
                });
                const data = await res.json();
                currentConversationId = data.conversationId;
                addMessage(data.text, false, data.widget);
                updateStatus();
            } catch (e) {
                addMessage("Fehler beim Senden der Nachricht.", false);
            }
        }


        async function updateStatus() {
            try {
                const res = await fetch('/messages', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        jsonrpc: "2.0", id: 1, method: "tools/call",
                        params: { name: "pruefe_licht", arguments: {} }
                    })
                });
                const data = await res.json();
                const text = data.result.content[0].text;
                statusEl.textContent = text;
                
                if (text.includes('on')) {
                    btnOn.classList.add('active-on');
                    btnOff.classList.remove('active-off');
                } else {
                    btnOff.classList.add('active-off');
                    btnOn.classList.remove('active-on');
                }
            } catch (e) {
                statusEl.textContent = "Offline";
            }
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        btnOn.onclick = () => fetch('/messages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc: "2.0", id: 2, method: "tools/call", params: { name: "schalte_licht", arguments: {status: 'on'} }}) }).then(updateStatus);
        btnOff.onclick = () => fetch('/messages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc: "2.0", id: 2, method: "tools/call", params: { name: "schalte_licht", arguments: {status: 'off'} }}) }).then(updateStatus);

        updateStatus();
        loadAlerts();
        setInterval(loadAlerts, 60000); // Jede Minute prüfen

    </script>
</body>
</html>
