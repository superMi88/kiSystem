<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gemini Mobile Light</title>
    <style>
        :root {
            --bg: #0f0f13;
            --card: rgba(30, 30, 46, 0.7);
            --accent: #89b4fa;
            --text: #cdd6f4;
            --on: #a6e3a1;
            --off: #f38ba8;
            --input: rgba(255, 255, 255, 0.05);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(137, 180, 250, 0.1) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(203, 166, 247, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        /* Top Panel: Buttons */
        .top-panel {
            padding: 20px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 { font-size: 1.2rem; font-weight: 300; margin: 0 0 15px 0; color: var(--accent); letter-spacing: 2px; }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
        }

        button.tool {
            border: none;
            border-radius: 15px;
            padding: 15px 10px;
            font-size: 0.9rem;
            font-weight: 600;
            background: var(--input);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }

        button.tool.active-on { background: var(--on); color: #11111b; }
        button.tool.active-off { background: var(--off); color: #11111b; }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #11111b;
            border-bottom-right-radius: 4px;
        }

        .message.ai {
            align-self: flex-start;
            background: var(--input);
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        /* Input Area */
        .input-area {
            padding: 20px;
            background: var(--card);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            background: var(--input);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 12px 20px;
            color: white;
            outline: none;
        }

        #send-btn {
            background: var(--accent);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    
    <div class="top-panel">
        <h1>LICHT STEUERUNG</h1>
        <div class="controls">
            <button id="btn-on" class="tool">EIN</button>
            <button id="btn-off" class="tool">AUS</button>
        </div>
        <div id="status" style="font-size: 0.75rem; opacity: 0.6;">Verbinde...</div>
    </div>

    <div class="chat-area" id="chat-box">
        <div class="message ai">Hallo! Ich bin dein Gemini-Lichtassistent. Wie kann ich dir helfen?</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Nachricht an Gemini...">
        <button id="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const btnOn = document.getElementById('btn-on');
        const btnOff = document.getElementById('btn-off');

        function addMessage(text, isUser) {
            const msg = document.createElement('div');
            msg.className = `message ${isUser ? 'user' : 'ai'}`;
            msg.textContent = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                addMessage(data.text, false);
                updateStatus();
            } catch (e) {
                addMessage("Fehler beim Senden der Nachricht.", false);
            }
        }

        async function updateStatus() {
            try {
                const res = await fetch('/messages', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        jsonrpc: "2.0", id: 1, method: "tools/call",
                        params: { name: "pruefe_licht", arguments: {} }
                    })
                });
                const data = await res.json();
                const text = data.result.content[0].text;
                statusEl.textContent = text;
                
                if (text.includes('on')) {
                    btnOn.classList.add('active-on');
                    btnOff.classList.remove('active-off');
                } else {
                    btnOff.classList.add('active-off');
                    btnOn.classList.remove('active-on');
                }
            } catch (e) {
                statusEl.textContent = "Offline";
            }
        }

        sendBtn.onclick = sendMessage;
        userInput.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        btnOn.onclick = () => fetch('/messages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc: "2.0", id: 2, method: "tools/call", params: { name: "schalte_licht", arguments: {status: 'on'} }}) }).then(updateStatus);
        btnOff.onclick = () => fetch('/messages', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({jsonrpc: "2.0", id: 2, method: "tools/call", params: { name: "schalte_licht", arguments: {status: 'off'} }}) }).then(updateStatus);

        updateStatus();
    </script>
</body>
</html>
