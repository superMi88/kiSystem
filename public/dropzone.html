<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Drop Zone</title>
    <style>
        :root {
            --accent: #89b4fa;
            --bg: rgba(30, 30, 46, 0.95);
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: transparent;
        }
        .drop-area {
            width: 200px;
            height: 80vh; /* Fast die ganze Höhe */
            background: var(--bg);
            border: 3px dashed rgba(137, 180, 250, 0.3);
            border-radius: 30px 0 0 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            color: var(--accent);
            opacity: 0;
            transform: translateX(200px);
            border-right: none;
            box-shadow: -20px 0 50px rgba(0,0,0,0.6);
        }
        .drop-area.active {
            opacity: 1;
            transform: translateX(0);
            border-color: var(--accent);
        }
        svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(137, 180, 250, 0.5));
        }
        .label {
            font-size: 16px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 20px;
        }
        /* Subtiler Hinweis-Strich */
        body::after {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--accent);
            opacity: 0.05;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>
    <div class="drop-area" id="drop-node">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <div class="label">Hier ablegen</div>
    </div>

    <script>
        const { ipcRenderer, webUtils } = require('electron');
        const dropNode = document.getElementById('drop-node');

        const handleDragOver = (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (!dropNode.classList.contains('active')) {
                ipcRenderer.send('resize-dropzone', true);
                dropNode.classList.add('active');
            }
        };

        window.addEventListener('dragover', handleDragOver);
        document.addEventListener('dragover', handleDragOver);

        const handleDragLeave = (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (e.clientX <= 0 || e.clientY <= 0 || e.clientX >= window.innerWidth || e.clientY >= window.innerHeight) {
                hideDropZone();
            }
        };

        window.addEventListener('dragleave', handleDragLeave);
        document.addEventListener('dragleave', handleDragLeave);

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            hideDropZone();

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const filePaths = Array.from(files).map(f => {
                    try {
                        return webUtils ? webUtils.getPathForFile(f) : f.path;
                    } catch(e) {
                        return f.path;
                    }
                });
                
                ipcRenderer.send('files-dropped', filePaths);
            }
        });

        function hideDropZone() {
            dropNode.classList.remove('active');
            setTimeout(() => {
                if (!dropNode.classList.contains('active')) {
                    ipcRenderer.send('resize-dropzone', false);
                }
            }, 500);
        }
    </script>
</body>
</html>
